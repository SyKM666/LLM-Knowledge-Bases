<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e1e4ed;
  --text2: #8b90a0;
  --accent: #6c8cff;
  --accent2: #4a6adf;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ─────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ── Top Bar ────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.topbar h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-right: auto;
}

.topbar h1 span { color: var(--accent); }

.btn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent2); border-color: var(--accent); }
.btn.primary:hover { background: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Sidebar ────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  margin-bottom: 8px;
}

.article-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.article-list li {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.1s;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.article-list li:hover { background: var(--surface2); }
.article-list li.active { background: var(--accent2); color: #fff; }

.sidebar input[type="text"],
.sidebar textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.sidebar input[type="text"]:focus,
.sidebar textarea:focus {
  border-color: var(--accent);
}
.sidebar textarea { resize: vertical; min-height: 60px; font-family: inherit; }

.sidebar-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

/* ── Main Content ───────────────────────── */
.main {
  overflow-y: auto;
  padding: 32px 48px;
}

.main-inner {
  max-width: 800px;
  margin: 0 auto;
}

/* Markdown rendered styles */
.md-content h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
.md-content h2 { font-size: 20px; font-weight: 600; margin: 28px 0 12px; color: var(--accent); }
.md-content h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
.md-content p { line-height: 1.7; margin-bottom: 12px; color: var(--text); }
.md-content ul, .md-content ol { padding-left: 24px; margin-bottom: 12px; }
.md-content li { line-height: 1.7; margin-bottom: 4px; }
.md-content code {
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}
.md-content pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  overflow-x: auto;
  margin-bottom: 16px;
}
.md-content pre code { background: none; padding: 0; }
.md-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
  color: var(--text2);
  margin-bottom: 12px;
}
.md-content a { color: var(--accent); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content table { border-collapse: collapse; margin-bottom: 16px; width: 100%; }
.md-content th, .md-content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.md-content th { background: var(--surface2); }
.md-content strong { color: #fff; }

/* ── Special panels ─────────────────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.panel.warn { border-color: var(--yellow); }
.panel.error { border-color: var(--red); }
.panel-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 12px;
}

.result-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
}
.result-item:hover { background: var(--surface2); }
.result-score {
  font-size: 12px;
  color: var(--text2);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
}

/* ── Loading ────────────────────────────── */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg {
  display: flex;
  align-items: center;
  color: var(--text2);
  font-size: 14px;
  padding: 40px 0;
}

/* ── Welcome ────────────────────────────── */
.welcome {
  text-align: center;
  padding: 80px 20px;
  color: var(--text2);
}
.welcome h2 { font-size: 24px; color: var(--text); margin-bottom: 12px; }
.welcome p { font-size: 14px; line-height: 1.8; }

/* Ingest modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 500px;
  max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; }
.modal .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.modal .tab {
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
}
.modal .tab.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
.modal .tab-content { display: none; }
.modal .tab-content.active { display: block; }
.modal input[type="text"], .modal textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  margin-bottom: 10px;
}
.modal textarea { min-height: 120px; font-family: inherit; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.status-bar {
  font-size: 12px;
  color: var(--text2);
  padding: 4px 0;
  min-height: 20px;
}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <header class="topbar">
    <h1><span>KB</span> Agent</h1>
    <div class="status-bar" id="statusBar"></div>
    <button class="btn" onclick="openIngest()">+ Ingest</button>
    <button class="btn" onclick="doCompile(false)" id="btnCompile">Compile</button>
    <button class="btn" onclick="doLint()" id="btnLint">Lint</button>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Articles -->
    <div>
      <div class="section-title">Wiki Articles</div>
      <ul class="article-list" id="articleList">
        <li style="color:var(--text2)">Loading...</li>
      </ul>
      <div style="margin-top:8px">
        <span class="btn" style="font-size:12px;padding:4px 10px" onclick="showIndex()">INDEX.md</span>
      </div>
    </div>

    <!-- Search -->
    <div>
      <div class="section-title">Search</div>
      <input type="text" id="searchInput" placeholder="Keywords..." onkeydown="if(event.key==='Enter')doSearch()">
      <div class="sidebar-actions">
        <button class="btn" onclick="doSearch()" style="flex:1">Search</button>
      </div>
    </div>

    <!-- Query -->
    <div>
      <div class="section-title">Ask a Question</div>
      <textarea id="queryInput" placeholder="Ask anything about the wiki..."></textarea>
      <label class="checkbox-row">
        <input type="checkbox" id="querySave"> Save answer to wiki
      </label>
      <div class="sidebar-actions">
        <button class="btn primary" onclick="doQuery()" style="flex:1" id="btnQuery">Ask</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="mainPanel">
    <div class="main-inner" id="mainContent">
      <div class="welcome">
        <h2>Welcome to KB Agent</h2>
        <p>
          Browse wiki articles on the left<br>
          Search, ask questions, or compile new content<br>
          Your personal LLM-powered knowledge base
        </p>
      </div>
    </div>
  </main>
</div>

<!-- Ingest Modal -->
<div class="modal-overlay" id="ingestModal">
  <div class="modal">
    <h3>Ingest New Document</h3>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('upload')">Upload File</div>
      <div class="tab" onclick="switchTab('paste')">Paste Text</div>
    </div>
    <div class="tab-content active" id="tab-upload">
      <input type="file" id="ingestFile" accept=".md,.txt,.html,.json,.csv">
      <p style="font-size:12px;color:var(--text2)">Supports .md, .txt, .html, .json, .csv</p>
    </div>
    <div class="tab-content" id="tab-paste">
      <input type="text" id="ingestFilename" placeholder="Filename (e.g. my-notes)">
      <textarea id="ingestContent" placeholder="Paste document content here..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeIngest()">Cancel</button>
      <button class="btn primary" onclick="submitIngest()">Ingest</button>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let currentSlug = null;

// ── Helpers ────────────────────────────────

function setStatus(msg) {
  $('#statusBar').textContent = msg;
}

function showLoading(msg) {
  $('#mainContent').innerHTML = `<div class="loading-msg"><div class="spinner"></div>${msg}</div>`;
}

function showMarkdown(md) {
  // Convert [[wikilinks]] to clickable links before parsing
  const withLinks = md.replace(/\[\[([^\]]+)\]\]/g, '[$1]($1.md)');
  $('#mainContent').innerHTML = `<div class="md-content">${marked.parse(withLinks)}</div>`;
}

// Intercept clicks on .md links inside rendered markdown → show article
document.addEventListener('click', e => {
  const a = e.target.closest('.md-content a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (href && href.endsWith('.md')) {
    e.preventDefault();
    const slug = href.replace(/\.md$/, '');
    showArticle(slug);
  }
});

function showError(msg) {
  $('#mainContent').innerHTML = `<div class="panel error"><div class="panel-title">Error</div>${msg}</div>`;
}

async function api(path, opts = {}) {
  const resp = await fetch(path, opts);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

function postJSON(path, body) {
  return api(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

// ── Articles ───────────────────────────────

async function loadArticles() {
  try {
    const data = await api('/api/articles');
    const list = $('#articleList');
    const slugs = Object.keys(data.articles).sort();
    if (slugs.length === 0) {
      list.innerHTML = '<li style="color:var(--text2)">No articles yet</li>';
      return;
    }
    list.innerHTML = slugs.map(s =>
      `<li onclick="showArticle('${s}')" title="${data.articles[s]}" ${s === currentSlug ? 'class="active"' : ''}>${s}</li>`
    ).join('');
  } catch (e) {
    console.error(e);
  }
}

async function showArticle(slug) {
  currentSlug = slug;
  // Update active state
  $$('.article-list li').forEach(li => li.classList.remove('active'));
  $$('.article-list li').forEach(li => {
    if (li.textContent === slug) li.classList.add('active');
  });

  showLoading('Loading article...');
  try {
    const data = await api(`/api/articles/${slug}`);
    showMarkdown(data.content);
    setStatus(`wiki/${slug}.md`);
  } catch (e) {
    showError(e.message);
  }
}

async function showIndex() {
  currentSlug = null;
  $$('.article-list li').forEach(li => li.classList.remove('active'));
  showLoading('Loading index...');
  try {
    const data = await api('/api/index');
    showMarkdown(data.content);
    setStatus('wiki/INDEX.md');
  } catch (e) {
    showError(e.message);
  }
}

// ── Search ─────────────────────────────────

async function doSearch() {
  const q = $('#searchInput').value.trim();
  if (!q) return;
  showLoading('Searching...');
  try {
    const data = await api(`/api/search?q=${encodeURIComponent(q)}`);
    if (data.results.length === 0) {
      $('#mainContent').innerHTML = '<div class="panel"><div class="panel-title">Search Results</div>No results found.</div>';
      return;
    }
    const html = data.results.map(r =>
      `<div class="result-item" onclick="showArticle('${r.slug}')">
        <span>${r.slug}</span>
        <span class="result-score">score: ${r.score}</span>
      </div>`
    ).join('');
    $('#mainContent').innerHTML = `<div class="panel"><div class="panel-title">Search Results for "${q}"</div>${html}</div>`;
    setStatus(`Search: ${q} — ${data.results.length} results`);
  } catch (e) {
    showError(e.message);
  }
}

// ── Query ──────────────────────────────────

async function doQuery() {
  const question = $('#queryInput').value.trim();
  if (!question) return;
  const save = $('#querySave').checked;

  $('#btnQuery').disabled = true;
  showLoading('Researching your question... This may take a moment.');
  try {
    const data = await postJSON('/api/query', { question, save });
    showMarkdown(data.answer);
    setStatus(save ? 'Answer saved to wiki' : 'Query complete');
    if (save) loadArticles();
  } catch (e) {
    showError(e.message);
  } finally {
    $('#btnQuery').disabled = false;
  }
}

// ── Compile ────────────────────────────────

async function doCompile(force) {
  $('#btnCompile').disabled = true;
  showLoading('Compiling raw documents into wiki articles...');
  setStatus('Compiling...');
  try {
    const data = await postJSON('/api/compile', { force });
    if (data.count === 0) {
      $('#mainContent').innerHTML = '<div class="panel"><div class="panel-title">Compile</div>Nothing new to compile. Use force to recompile all.</div>';
    } else {
      const list = data.created.map(s => `<li><strong>${s}.md</strong></li>`).join('');
      $('#mainContent').innerHTML = `<div class="panel"><div class="panel-title">Compiled ${data.count} Articles</div><ul style="padding-left:20px">${list}</ul></div>`;
    }
    setStatus(`Compiled ${data.count} articles`);
    loadArticles();
  } catch (e) {
    showError(e.message);
  } finally {
    $('#btnCompile').disabled = false;
  }
}

// ── Lint ───────────────────────────────────

async function doLint() {
  $('#btnLint').disabled = true;
  showLoading('Running health checks... LLM analysis may take a moment.');
  setStatus('Linting...');
  try {
    const data = await postJSON('/api/lint', {});
    let html = '';
    if (data.structural && data.structural.length > 0) {
      const items = data.structural.map(s => `<li>${s}</li>`).join('');
      html += `<div class="panel warn"><div class="panel-title">Structural Issues</div><ul style="padding-left:20px">${items}</ul></div>`;
    } else {
      html += '<div class="panel"><div class="panel-title">Structural Issues</div>None found ✓</div>';
    }
    if (data.llm) {
      html += `<div class="panel"><div class="panel-title">LLM Analysis</div><div class="md-content">${marked.parse(data.llm)}</div></div>`;
    }
    $('#mainContent').innerHTML = `<div class="main-inner">${html}</div>`;
    setStatus('Lint complete');
  } catch (e) {
    showError(e.message);
  } finally {
    $('#btnLint').disabled = false;
  }
}

// ── Ingest ─────────────────────────────────

function openIngest() { $('#ingestModal').classList.add('open'); }
function closeIngest() { $('#ingestModal').classList.remove('open'); }

function switchTab(tab) {
  $$('.modal .tab').forEach(t => t.classList.remove('active'));
  $$('.modal .tab-content').forEach(t => t.classList.remove('active'));
  if (tab === 'upload') {
    $$('.modal .tab')[0].classList.add('active');
    $('#tab-upload').classList.add('active');
  } else {
    $$('.modal .tab')[1].classList.add('active');
    $('#tab-paste').classList.add('active');
  }
}

async function submitIngest() {
  const isUpload = $('#tab-upload').classList.contains('active');

  try {
    if (isUpload) {
      const file = $('#ingestFile').files[0];
      if (!file) { alert('Please select a file'); return; }
      const form = new FormData();
      form.append('file', file);
      const resp = await fetch('/api/ingest/file', { method: 'POST', body: form });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error);
      setStatus(`Ingested: ${data.filename}`);
    } else {
      const filename = $('#ingestFilename').value.trim();
      const content = $('#ingestContent').value.trim();
      if (!filename || !content) { alert('Filename and content are required'); return; }
      await postJSON('/api/ingest/text', { filename, content });
      setStatus(`Ingested: ${filename}`);
    }
    closeIngest();
    $('#mainContent').innerHTML = '<div class="panel"><div class="panel-title">Ingested</div>Document added to raw/. Click <strong>Compile</strong> to process it into the wiki.</div>';
  } catch (e) {
    alert('Ingest error: ' + e.message);
  }
}

// Close modal on overlay click
$('#ingestModal').addEventListener('click', e => {
  if (e.target === $('#ingestModal')) closeIngest();
});

// ── Init ───────────────────────────────────
loadArticles();
</script>
</body>
</html>
